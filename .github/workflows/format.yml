name: Format
on:
  pull_request:
    branches:
      - master
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          sparse-checkout: |
            drivers/nvme
            .clang-format
          sparse-checkout-cone: true

      - name: Check Formatting
        run: |
          find drivers/nvme/ -regex '.*\.\(c\|cpp\|h\|hpp\)' -exec clang-format -i --style=file {} +
          git diff --exit-code || (echo 'Formatting issues found. Please run clang-format.' && exit 1)
