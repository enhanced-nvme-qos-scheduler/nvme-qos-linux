name: Format
on:
  pull_request:
    branches:
      - mega
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check Formatting
        run: |
          find drivers/nvme/ -regex '.*\.\(c\|cpp\|h\|hpp\)' -exec clang-format -i --style=file {} +
          git diff --exit-code || (echo 'Formatting issues found. Please run clang-format.' && exit 1)
