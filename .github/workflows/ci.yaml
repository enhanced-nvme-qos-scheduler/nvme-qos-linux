name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Fetch master for merge-base
        run: |
          git fetch origin master --depth=1
          echo "BASE_SHA=$(git rev-parse FETCH_HEAD)" >> $GITHUB_ENV

      - name: Run lint
        run: ./scripts/lint.sh
