name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  checkpatch:
    name: checkpatch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y perl

      - name: Run checkpatch on PR changes
        if: github.event_name == 'pull_request'
        run: |
          # get the diff between base and head
          git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} -- drivers/nvme/host/ > /tmp/pr.patch

          if [[ -s /tmp/pr.patch ]]; then
            echo "Checking changes in drivers/nvme/host/..."
            output=$(./scripts/checkpatch.pl --no-tree --no-signoff /tmp/pr.patch 2>&1) || true
            echo "$output"

            # only fail on errors, not warnings
            errors=$(echo "$output" | grep -oP 'total: \K[0-9]+(?= errors)' || echo "0")
            if [[ "$errors" -gt 0 ]]; then
              echo "::error::checkpatch found $errors error(s)"
              exit 1
            fi
          else
            echo "No changes in drivers/nvme/host/"
          fi

      - name: Run checkpatch on push changes
        if: github.event_name == 'push'
        run: |
          # check the pushed commits
          if [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff ${{ github.event.before }}..${{ github.sha }} -- drivers/nvme/host/ > /tmp/push.patch

            if [[ -s /tmp/push.patch ]]; then
              echo "Checking changes in drivers/nvme/host/..."
              output=$(./scripts/checkpatch.pl --no-tree --no-signoff /tmp/push.patch 2>&1) || true
              echo "$output"

              # only fail on errors, not warnings
              errors=$(echo "$output" | grep -oP 'total: \K[0-9]+(?= errors)' || echo "0")
              if [[ "$errors" -gt 0 ]]; then
                echo "::error::checkpatch found $errors error(s)"
                exit 1
              fi
            else
              echo "No changes in drivers/nvme/host/"
            fi
          else
            echo "Initial push, skipping diff check"
          fi

