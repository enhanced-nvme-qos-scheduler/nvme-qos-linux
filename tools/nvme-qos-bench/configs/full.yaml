# Full benchmark config - comprehensive sweep
# Runtime: ~2-3 hours

runtime: 60           # seconds per test
ramp_time: 10         # warmup seconds
iterations: 10        # iterations per config for statistical significance

# Full parameter sweep
depths: [1, 4, 8, 16, 32, 64, 128]
weights: [1, 4, 9, 19, 99]
policies: [default, force_high, force_normal]

# Job configuration
high_numjobs: 1
normal_numjobs: 4

# Tests to run
run_baseline: true
run_qos: true
run_cpu_overhead: true
run_isolation: true   # Run single-priority tests too

# Output
output_json: true
output_csv: true
output_markdown: true
