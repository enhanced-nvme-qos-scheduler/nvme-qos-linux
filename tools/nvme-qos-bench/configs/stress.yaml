# Stress benchmark config - high contention to exercise WRR scheduler
# Runtime: ~25-35 min
# Total effective QD: 320-640 (2x high + 8x normal per depth)

runtime: 30           # seconds per test
ramp_time: 5          # warmup seconds
iterations: 3         # iterations per config

# Moderate depths with high job counts for contention
depths: [32, 64]
weights: [1, 4, 9, 19]

# High job counts + CPU pinning to create real per-queue contention
high_numjobs: 4
normal_numjobs: 16
max_queues: 2

# Tests to run
run_baseline: true
run_qos: true

# Output
output_json: true
output_csv: true
output_markdown: true
